<!DOCTYPE html>
<html lang="en">
<head>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body, #root { margin: 0; height: 100%; overflow: hidden;
    font-family: 'Comic Sans MS', 'Trebuchet MS', 'Mangal', sans-serif; }
  body { background: linear-gradient(135deg, #ffe0f0, #e0f4ff); touch-action: manipulation; }
  button { font-family: inherit; cursor: pointer; border: none; }

  .home { display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    height: 100%; padding: 20px; overflow-y: auto; }
  .home h1 { font-size: clamp(2rem, 7vw, 4rem); margin: 10px 0 20px; color: #d63384;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1); animation: bounce 2s infinite; text-align: center; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: min(640px, 95vw); padding-bottom: 30px; }
  .menu button { font-size: clamp(1rem, 2.4vw, 1.4rem); padding: 18px 8px; border-radius: 22px;

  .m1 { color: #e8590c; } .m2 { color: #2f9e44; } .m3 { color: #1971c2; } .m4 { color: #9c36b5; }

  .back { position: fixed; top: 16px; left: 16px; z-index: 10; background: #fff;
    border-radius: 50%; width: 56px; height: 56px; font-size: 28px; box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
  .back:active { transform: translateY(2px); }

  .stage { height: 100%; width: 100%; position: relative; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 70px 10px 10px; }

  /* Generic tap-grid */
  .tap-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    width: min(700px, 95vw); }
  .tap-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .tap-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .tap-btn { font-size: clamp(2.5rem, 10vw, 5rem); aspect-ratio: 1; border-radius: 26px;
    background: white; box-shadow: 0 6px 0 rgba(0,0,0,0.15); display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .tap-btn:active { transform: scale(0.94); }
  .tap-btn .label { font-size: clamp(0.7rem, 1.8vw, 1.1rem); margin-top: 4px; color: #444; font-weight: bold; }

  /* Big overlay (for animal/fruit/vehicle tap) */
  .big-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;

  .big-overlay .e { font-size: min(55vw, 55vh); animation: pop 1.2s ease-out; }
  .big-overlay .label { position: absolute; bottom: 12%; font-size: clamp(1.8rem, 6vw, 4rem); color: #d63384;

  @keyframes pop { 0% { transform: scale(0.2); opacity: 0; } 50% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes rise { 0% { transform: translateY(40px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

  .balloon { position: absolute; font-size: clamp(4rem, 14vw, 8rem); cursor: pointer; pointer-events: auto;

  .pop-burst { position: absolute; font-size: clamp(3rem, 10vw, 6rem); pointer-events: none;
    animation: burst 0.6s ease-out forwards; }
  @keyframes burst { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
  .score { position: fixed; top: 20px; right: 20px; background: white; padding: 10px 20px;
    border-radius: 20px; font-size: 1.5rem; font-weight: bold; color: #d63384; box-shadow: 0 4px 0 rgba(0,0,0,0.15); }

  /* Colors */
  .prompt { font-size: clamp(1.6rem, 5vw, 3rem); margin-bottom: 16px; color: #444; font-weight: bold; text-align: center; }
  .color-shape { font-size: clamp(5rem, 18vw, 10rem); margin-bottom: 20px; animation: wiggle 1s infinite; }

  .color-options { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
  .color-circle { width: clamp(80px, 18vw, 130px); height: clamp(80px, 18vw, 130px); border-radius: 50%;

  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

  /* Music */
  .music-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 20px; width: min(700px, 95vw); }
  .music-btn { aspect-ratio: 1; border-radius: 28px; font-size: clamp(3rem, 10vw, 5rem);

  .num-display { font-size: clamp(6rem, 22vw, 14rem); color: #d63384; font-weight: bold;

  .cheer { position: fixed; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center;

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ---------- audio ----------
let audioCtx = null;
const getCtx = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
};
const playTone = (freq, duration = 0.4, type = 'sine') => {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
};
const playPop = () => {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.2);
};

// ---------- Hindi voice: Google Translate TTS (clear female voice) ----------
// Endpoint: https://translate.google.com/translate_tts?ie=UTF-8&q=...&tl=hi&client=tw-ob
// We use an <audio> element so we don't need CORS for playback.
// Fallback to browser speechSynthesis if the network call fails.

let hindiVoice = null;
const loadVoices = () => {
  if (typeof speechSynthesis === 'undefined') return;
  const voices = window.speechSynthesis.getVoices();
  hindiVoice =
    voices.find(v => /^hi/i.test(v.lang) && /female|heera|kalpana|swara|lekha|asha|priya/i.test(v.name)) ||
    voices.find(v => /^hi/i.test(v.lang)) ||
    voices.find(v => /female|heera|kalpana|swara|lekha|zira/i.test(v.name)) ||
    null;
};
loadVoices();
if (typeof speechSynthesis !== 'undefined') {
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

// ---------- IndexedDB for parent-recorded clips ----------
const DB_NAME = 'akshita-voices';
const STORE = 'clips';
let dbPromise = null;
const idb = () => {
  if (!dbPromise) {
    dbPromise = new Promise((resolve, reject) => {
      const r = indexedDB.open(DB_NAME, 1);
      r.onupgradeneeded = () => r.result.createObjectStore(STORE);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }
  return dbPromise;
};
const idbGet = async (key) => {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE).objectStore(STORE).get(key);
    tx.onsuccess = () => res(tx.result);
    tx.onerror = () => rej(tx.error);
  });
};
const idbPut = async (key, val) => {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
};
const idbDel = async (key) => {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
};
const idbKeys = async () => {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE).objectStore(STORE).getAllKeys();
    tx.onsuccess = () => res(tx.result || []);
    tx.onerror = () => rej(tx.error);
  });
};

// In-memory cache of object-URLs for recorded clips
const recordedUrls = {};
const loadRecordedIndex = async () => {
  try {
    const keys = await idbKeys();
    for (const k of keys) {
      if (recordedUrls[k]) continue;
      const blob = await idbGet(k);
      if (blob) recordedUrls[k] = URL.createObjectURL(blob);
    }
  } catch (e) {}
};
const refreshRecordedUrl = async (key) => {
  if (recordedUrls[key]) { URL.revokeObjectURL(recordedUrls[key]); delete recordedUrls[key]; }
  const blob = await idbGet(key);
  if (blob) recordedUrls[key] = URL.createObjectURL(blob);
};

// ---------- speak() ----------
const ttsCache = {};
let currentAudio = null;

const browserSpeak = (text) => {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'hi-IN';
    if (hindiVoice) u.voice = hindiVoice;
    u.rate = 0.85; u.pitch = 1.5; u.volume = 1;
    window.speechSynthesis.speak(u);
  } catch (e) {}
};
const ttsUrl = (text) =>
  `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=hi&client=tw-ob`;

const speak = (text) => {
  if (!text) return;
  try { if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; } } catch (e) {}
  try { window.speechSynthesis.cancel(); } catch (e) {}

  // 1. Recorded clip (parent's voice) — best quality
  if (recordedUrls[text]) {
    const a = new Audio(recordedUrls[text]);
    currentAudio = a;
    a.play().catch(() => playTTS(text));
    return;
  }
  // 2. Google TTS fallback
  playTTS(text);
};

const playTTS = (text) => {
  let audio = ttsCache[text];
  if (!audio) {
    audio = new Audio(ttsUrl(text));
    audio.preload = 'auto';
    ttsCache[text] = audio;
    audio.addEventListener('error', () => { delete ttsCache[text]; browserSpeak(text); });
  }
  currentAudio = audio;
  const p = audio.play();
  if (p && p.catch) p.catch(() => browserSpeak(text));
};

// ---------- cheer overlay ----------
function Cheer({ text, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 1100);
    return () => clearTimeout(t);
  }, [onDone]);
  return <div className="cheer">{text}</div>;
}

const CHEERS = ['शाबाश अक्षिता!', 'बहुत अच्छा!', 'वाह वाह!', 'क्या बात है!'];
const cheerOf = () => CHEERS[Math.floor(Math.random() * CHEERS.length)];

// ---------- Home ----------
function Home({ onPick }) {
  return (
    <div className="home">
      <h1>नमस्ते अक्षिता! 🌸</h1>
      <div className="menu">
        <button className="m1" onClick={() => onPick('animals')}>
          <span className="emoji">🐶</span>जानवर
        </button>
        <button className="m2" onClick={() => onPick('balloons')}>
          <span className="emoji">🎈</span>गुब्बारे
        </button>
        <button className="m3" onClick={() => onPick('colors')}>
          <span className="emoji">🎨</span>रंग
        </button>
        <button className="m4" onClick={() => onPick('music')}>
          <span className="emoji">🎵</span>संगीत
        </button>
        <button className="m5" onClick={() => onPick('numbers')}>
          <span className="emoji">🔢</span>गिनती
        </button>
        <button className="m6" onClick={() => onPick('fruits')}>
          <span className="emoji">🍎</span>फल
        </button>
        <button className="m7" onClick={() => onPick('vehicles')}>
          <span className="emoji">🚗</span>गाड़ियाँ
        </button>
        <button className="m8" onClick={() => onPick('body')}>
          <span className="emoji">👁️</span>शरीर
        </button>
      </div>
      <button className="parent-btn" onClick={() => onPick('parent')}>
        🎤 अपनी आवाज़ रिकॉर्ड करें (Parent mode)
      </button>
    </div>
  );
}

// ---------- helper: tap-to-speak grid ----------
function TapSpeakGrid({ items, cols = 3 }) {
  const [picked, setPicked] = useState(null);
  const onTap = (it) => {
    setPicked(it);
    speak(it.say || it.hi);
    setTimeout(() => setPicked(null), 2000);
  };
  return (
    <div className="stage">
      <div className={`tap-grid cols-${cols}`}>
        {items.map((it, i) => (
          <button key={i} className="tap-btn" onClick={() => onTap(it)}>
            <span>{it.e}</span>
            <span className="label">{it.hi}</span>
          </button>
        ))}
      </div>
      {picked && (
        <div className="big-overlay">
          <div className="e">{picked.e}</div>
          <div className="label">{picked.hi}</div>
        </div>
      )}
    </div>
  );
}

// ---------- Animals ----------
const ANIMALS = [
  { e: '🐶', hi: 'कुत्ता', say: 'कुत्ता! भौं भौं!' },
  { e: '🐱', hi: 'बिल्ली', say: 'बिल्ली! म्याऊँ म्याऊँ!' },
  { e: '🐮', hi: 'गाय', say: 'गाय! अम्बे!' },
  { e: '🐸', hi: 'मेंढक', say: 'मेंढक! टर्र टर्र!' },
  { e: '🦁', hi: 'शेर', say: 'शेर! दहाड़!' },
  { e: '🐵', hi: 'बंदर', say: 'बंदर! ऊ ऊ आ आ!' },
  { e: '🐘', hi: 'हाथी', say: 'हाथी!' },
  { e: '🦆', hi: 'बत्तख़', say: 'बत्तख़! क्वैक क्वैक!' },
  { e: '🐝', hi: 'मधुमक्खी', say: 'मधुमक्खी! भन भन!' },

// ---------- Fruits ----------
const FRUITS = [
  { e: '🍎', hi: 'सेब' },
  { e: '🍌', hi: 'केला' },
  { e: '🥭', hi: 'आम' },
  { e: '🍇', hi: 'अंगूर' },
  { e: '🍊', hi: 'संतरा' },
  { e: '🍓', hi: 'स्ट्रॉबेरी' },
  { e: '🍉', hi: 'तरबूज़' },
  { e: '🍍', hi: 'अनानास' },
  { e: '🥝', hi: 'कीवी' },

// ---------- Vehicles ----------
const VEHICLES = [
  { e: '🚗', hi: 'गाड़ी', say: 'गाड़ी! पों पों!' },
  { e: '🚌', hi: 'बस', say: 'बस!' },
  { e: '🚂', hi: 'रेलगाड़ी', say: 'रेलगाड़ी! छुक छुक!' },
  { e: '✈️', hi: 'हवाई जहाज़', say: 'हवाई जहाज़!' },
  { e: '🚲', hi: 'साइकिल', say: 'साइकिल! टन टन!' },
  { e: '⛵', hi: 'नाव', say: 'नाव!' },
  { e: '🚒', hi: 'दमकल', say: 'दमकल!' },
  { e: '🚜', hi: 'ट्रैक्टर', say: 'ट्रैक्टर!' },
  { e: '🚀', hi: 'रॉकेट', say: 'रॉकेट! फुर्र!' },

// ---------- Body parts ----------
const BODY = [
  { e: '👁️', hi: 'आँख' },
  { e: '👃', hi: 'नाक' },
  { e: '👂', hi: 'कान' },
  { e: '👄', hi: 'मुँह' },
  { e: '✋', hi: 'हाथ' },
  { e: '🦶', hi: 'पैर' },
  { e: '🦷', hi: 'दाँत' },

  { e: '🧠', hi: 'दिमाग़' },

// ---------- Balloons ----------
function Balloons() {
  const [balloons, setBalloons] = useState([]);
  const [bursts, setBursts] = useState([]);
  const [score, setScore] = useState(0);
  const idRef = useRef(0);
  const [cheer, setCheer] = useState(null);

  useEffect(() => {
    const spawn = () => {
      const id = ++idRef.current;
      const left = 5 + Math.random() * 85;
      const duration = 6000 + Math.random() * 3000;
      setBalloons(b => [...b, { id, left, duration }]);
      setTimeout(() => setBalloons(b => b.filter(x => x.id !== id)), duration);
    };
    spawn();
    const iv = setInterval(spawn, 1200);
    return () => clearInterval(iv);
  }, []);

  const pop = (id, x, y) => {
    playPop();
    setBalloons(b => b.filter(x => x.id !== id));
    const bid = ++idRef.current;
    setBursts(prev => [...prev, { id: bid, x, y }]);
    setTimeout(() => setBursts(prev => prev.filter(b => b.id !== bid)), 600);
    setScore(s => {
      const ns = s + 1;
      if (ns % 5 === 0) {
        const c = cheerOf();
        setCheer(c);
        speak(c);
      }
      return ns;
    });
  };

  return (
    <div className="stage" style={{ overflow: 'hidden' }}>
      <div className="score">⭐ {score}</div>
      {balloons.map(b => <Balloon key={b.id} b={b} onPop={pop} />)}
      {bursts.map(b => (
        <div key={b.id} className="pop-burst" style={{ left: b.x, top: b.y }}>✨</div>
      ))}
      {cheer && <Cheer text={cheer} onDone={() => setCheer(null)} />}
    </div>
  );
}
function Balloon({ b, onPop }) {
  const ref = useRef(null);
  const [y, setY] = useState(window.innerHeight + 100);
  useEffect(() => { requestAnimationFrame(() => setY(-200)); }, []);
  const handle = () => {
    const rect = ref.current.getBoundingClientRect();
    onPop(b.id, rect.left, rect.top);
  };
  return (
    <div
      ref={ref}
      className="balloon"
      onClick={handle}
      onTouchStart={handle}
      style={{
        left: `${b.left}%`,
        top: 0,
        transform: `translateY(${y}px)`,
        transition: `transform ${b.duration}ms linear`,
        filter: `hue-rotate(${(b.id * 47) % 360}deg)`,
      }}
    >🎈</div>
  );
}

// ---------- Colors ----------
const COLORS = [
  { hi: 'लाल', hex: '#ff5252' },
  { hi: 'नीला', hex: '#4dabf7' },
  { hi: 'पीला', hex: '#ffd43b' },
  { hi: 'हरा', hex: '#51cf66' },
  { hi: 'बैंगनी', hex: '#cc5de8' },
  { hi: 'नारंगी', hex: '#ff922b' },
];
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n, must) {
  const pool = arr.filter(x => x !== must);
  const out = [must];
  while (out.length < n) {
    const p = pick(pool);
    if (!out.includes(p)) out.push(p);
  }
  return out.sort(() => Math.random() - 0.5);
}
function ColorMatch() {
  const [target, setTarget] = useState(() => COLORS[0]);
  const [options, setOptions] = useState(() => pickN(COLORS, 3, COLORS[0]));
  const [wrongId, setWrongId] = useState(null);
  const [cheer, setCheer] = useState(null);

  const next = useCallback(() => {
    const t = pick(COLORS);
    setTarget(t);
    setOptions(pickN(COLORS, 3, t));
  }, []);
  useEffect(() => { speak(`${target.hi} ढूँढो`); }, [target]);

  const choose = (c) => {
    if (c.hi === target.hi) {
      playTone(660, 0.2); setTimeout(() => playTone(880, 0.3), 150);
      const cc = cheerOf();
      setCheer(cc);
      speak(`${target.hi}! ${cc}`);
      setTimeout(next, 1500);
    } else {
      playTone(200, 0.3, 'sawtooth');
      setWrongId(c.hi);
      setTimeout(() => setWrongId(null), 400);
    }
  };

  return (
    <div className="stage">
      <div className="prompt">{target.hi} ढूँढो!</div>
      <div className="color-shape" style={{ color: target.hex }}>⬤</div>
      <div className="color-options">
        {options.map(c => (
          <div
            key={c.hi}
            className={`color-circle ${wrongId === c.hi ? 'wrong' : ''}`}
            style={{ background: c.hex }}
            onClick={() => choose(c)}
          />
        ))}
      </div>
      {cheer && <Cheer text={cheer} onDone={() => setCheer(null)} />}
    </div>
  );
}

// ---------- Music ----------
const NOTES = [
  { e: '🔴', f: 261.63, c: '#ff6b6b' },
  { e: '🟠', f: 293.66, c: '#ff922b' },
  { e: '🟡', f: 329.63, c: '#fcc419' },
  { e: '🟢', f: 349.23, c: '#51cf66' },
  { e: '🔵', f: 392.00, c: '#4dabf7' },
  { e: '🟣', f: 440.00, c: '#cc5de8' },
  { e: '⭐', f: 493.88, c: '#ffd43b' },
  { e: '💖', f: 523.25, c: '#f783ac' },
  { e: '🌈', f: 587.33, c: '#9775fa' },
];
function Music() {

    <div className="stage">
      <div className="music-grid">
        {NOTES.map((n, i) => (
          <button
            key={i}

// ---------- Numbers ----------
const NUM_WORDS = ['', 'एक', 'दो', 'तीन', 'चार', 'पाँच', 'छह', 'सात', 'आठ', 'नौ', 'दस'];
const NUM_EMOJI = ['🌟','🎈','🍎','🦋','🌸','🐞','🍓','🐥','🎀','💖'];
function Numbers() {
  const [n, setN] = useState(1);
  const [showCheer, setShowCheer] = useState(null);
  const tap = () => {
    const next = n >= 10 ? 1 : n + 1;
    setN(next);
    speak(NUM_WORDS[next]);
    if (next === 10) {
      setTimeout(() => {
        const c = cheerOf();
        setShowCheer(c);
        speak(c);
      }, 700);
    }
  };
  const emoji = NUM_EMOJI[(n - 1) % NUM_EMOJI.length];
  return (
    <div className="stage" onClick={tap} style={{ cursor: 'pointer' }}>
      <div className="num-display" key={n}>{n}</div>
      <div className="num-items">{emoji.repeat(n)}</div>
      <div className="num-items" style={{ color: '#d63384', marginTop: 6 }}>{NUM_WORDS[n]}</div>
      <div className="num-tap">कहीं भी छुओ ✨</div>
      {showCheer && <Cheer text={showCheer} onDone={() => setShowCheer(null)} />}
    </div>
  );
}

// ---------- Parent record mode ----------
function buildVoiceLibrary() {
  const groups = [
    { title: '🐶 जानवर', items: ANIMALS.map(a => ({ label: a.hi, emoji: a.e, text: a.say })) },
    { title: '🍎 फल', items: FRUITS.map(f => ({ label: f.hi, emoji: f.e, text: f.hi })) },
    { title: '🚗 गाड़ियाँ', items: VEHICLES.map(v => ({ label: v.hi, emoji: v.e, text: v.say })) },
    { title: '👁️ शरीर', items: BODY.map(b => ({ label: b.hi, emoji: b.e, text: b.hi })) },
    { title: '🎨 रंग', items: COLORS.flatMap(c => [
        { label: c.hi, emoji: '⬤', text: c.hi, color: c.hex },
        { label: `${c.hi} ढूँढो`, emoji: '🔍', text: `${c.hi} ढूँढो`, color: c.hex },
      ]) },
    { title: '🔢 गिनती', items: NUM_WORDS.slice(1).map((w, i) => ({ label: w, emoji: String(i+1), text: w })) },
    { title: '🌟 तारीफ़', items: CHEERS.map(c => ({ label: c, emoji: '🌟', text: c })) },
  ];
  return groups;
}

function ParentMode() {
  const [groups] = useState(buildVoiceLibrary);
  const [recordingKey, setRecordingKey] = useState(null);
  const [, force] = useState(0);
  const mediaRef = useRef({ recorder: null, chunks: [], stream: null });

  useEffect(() => { loadRecordedIndex().then(() => force(x => x + 1)); }, []);

  const startRec = async (key) => {
    try {
      if (mediaRef.current.recorder) return;
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
      const rec = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      rec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: mime });
        await idbPut(key, blob);
        await refreshRecordedUrl(key);
        mediaRef.current = { recorder: null, chunks: [], stream: null };
        setRecordingKey(null);
        force(x => x + 1);
      };
      mediaRef.current = { recorder: rec, chunks, stream };
      rec.start();
      setRecordingKey(key);
    } catch (e) {
      alert('Microphone permission needed: ' + e.message);
    }
  };
  const stopRec = () => {
    const r = mediaRef.current.recorder;
    if (r && r.state !== 'inactive') r.stop();
  };
  const delRec = async (key) => {
    await idbDel(key);
    if (recordedUrls[key]) { URL.revokeObjectURL(recordedUrls[key]); delete recordedUrls[key]; }
    force(x => x + 1);
  };
  const playRec = (key) => speak(key);

  return (
    <div className="parent-stage">
      <h2 style={{ textAlign: 'center', color: '#d63384', margin: '10px 0' }}>
        🎤 Record your voice for Akshita
      </h2>
      <p style={{ textAlign: 'center', color: '#666', margin: '0 0 20px', fontSize: '0.95rem' }}>
        Tap 🎤 to record your voice for each word. The app will play your voice instead of TTS.
      </p>
      {groups.map(g => (
        <div key={g.title} className="parent-group">
          <h3>{g.title}</h3>
          <div className="parent-items">
            {g.items.map(it => {
              const has = !!recordedUrls[it.text];
              const isRec = recordingKey === it.text;
              return (
                <div key={it.text} className={`parent-row ${isRec ? 'rec' : ''}`}>
                  <span className="pr-emoji" style={it.color ? { color: it.color } : null}>{it.emoji}</span>
                  <span className="pr-label">{it.label}</span>
                  <span className={`pr-dot ${has ? 'on' : ''}`} title={has ? 'Recorded' : 'Not recorded'}>●</span>
                  {!isRec && (
                    <button className="pr-btn rec" onClick={() => startRec(it.text)}>🎤</button>
                  )}
                  {isRec && (
                    <button className="pr-btn stop" onClick={stopRec}>⏹</button>
                  )}
                  <button className="pr-btn" disabled={!has} onClick={() => playRec(it.text)}>▶️</button>
                  <button className="pr-btn" disabled={!has} onClick={() => delRec(it.text)}>🗑</button>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{ height: 40 }} />
    </div>
  );
}

// ---------- App ----------
function App() {
  const [view, setView] = useState('home');
  useEffect(() => { loadRecordedIndex(); }, []);
  const go = (v) => { getCtx(); loadVoices(); setView(v); };
  return (
    <>
      {view !== 'home' && (
        <button className="back" onClick={() => { window.speechSynthesis.cancel(); setView('home'); }}>🏠</button>
      )}
      {view === 'home' && <Home onPick={go} />}
      {view === 'animals' && <TapSpeakGrid items={ANIMALS} />}
      {view === 'fruits' && <TapSpeakGrid items={FRUITS} />}
      {view === 'vehicles' && <TapSpeakGrid items={VEHICLES} />}
      {view === 'body' && <TapSpeakGrid items={BODY} />}
      {view === 'balloons' && <Balloons />}
      {view === 'colors' && <ColorMatch />}
      {view === 'music' && <Music />}
      {view === 'numbers' && <Numbers />}
      {view === 'parent' && <ParentMode />}
      <div className="voice-note">Tip: Record your own voice in Parent mode for best quality 🎤</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
